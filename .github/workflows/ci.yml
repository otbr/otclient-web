name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run typecheck:proxy
      - run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run audit:ci

  merge-delay:
    runs-on: ubuntu-latest
    needs: [check, security]
    if: github.event_name == 'pull_request'
    steps:
      - name: Wait before auto-merge eligibility
        run: sleep 300
      - name: Merge delay complete
        run: echo "Auto-merge delay complete"
